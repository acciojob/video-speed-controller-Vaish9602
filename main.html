<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Speed Controller</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="player">

    <!-- ✅ MUST BE player__video -->
    <video class="player__video" src="https://www.w3schools.com/html/mov_bbb.mp4"></video>

    <div class="player__controls">

      <!-- Progress Bar -->
      <div class="progress">
        <div class="progress__filled"></div>
      </div>

      <!-- Play/Pause -->
      <button class="player__button toggle">►</button>

      <!-- Rewind -->
      <button class="player__button rewind" data-skip="-10">« 10s</button>

      <!-- Forward -->
      <button class="player__button forward" data-skip="25">25s »</button>

      <!-- Volume -->
      <input type="range" name="volume" min="0" max="1" step="0.05" value="1">

      <!-- Playback Speed -->
      <input type="range" name="playbackRate" min="0.5" max="2" step="0.1" value="1">

    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
